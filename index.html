<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#C0392B">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Restos Marseille">
<title>Restos Marseille</title>
<link rel="manifest" href="manifest.json">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  :root {
    --accent: #C0392B;
    --accent2: #E67E22;
    --dark: #f5f5f5;
    --dark2: #ffffff;
    --dark3: #f0f0f0;
    --card: #ffffff;
    --text: #1a1a1a;
    --muted: #888888;
    --border: rgba(0,0,0,0.10);
    --success: #27ae60;
    --radius: 16px;
    --radius-sm: 10px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--dark);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* HEADER */
  header {
    background: var(--dark2);
    border-bottom: 1px solid var(--border);
    padding: 0 20px;
    position: sticky;
    top: 0;
    z-index: 100;
    display: flex;
    align-items: center;
    gap: 16px;
    height: 60px;
  }

  .logo {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 20px;
    color: var(--accent);
    letter-spacing: -0.5px;
    flex: 1;
  }

  .logo span { color: var(--text); }

  .header-actions { display: flex; gap: 10px; }

  .btn-icon {
    width: 38px; height: 38px;
    background: var(--dark3);
    border: 1px solid var(--border);
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    transition: background 0.2s;
    color: var(--text);
  }
  .btn-icon:hover { background: var(--dark2); }
  .btn-icon svg { width: 18px; height: 18px; }

  /* SEARCH BAR */
  .search-wrap {
    padding: 14px 20px 0;
    position: relative;
  }
  .search-wrap input {
    width: 100%;
    background: var(--dark3);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 11px 16px 11px 42px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    outline: none;
    transition: border 0.2s;
  }
  .search-wrap input::placeholder { color: var(--muted); }
  .search-wrap input:focus { border-color: var(--accent); }
  .search-icon {
    position: absolute;
    left: 34px; top: 50%;
    transform: translateY(-50%);
    color: var(--muted);
    pointer-events: none;
    margin-top: 7px;
  }

  /* FILTERS */
  .filters {
    padding: 12px 20px;
    display: flex;
    gap: 8px;
    overflow-x: auto;
    scrollbar-width: none;
  }
  .filters::-webkit-scrollbar { display: none; }

  .filter-btn {
    white-space: nowrap;
    padding: 7px 14px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: var(--dark3);
    color: var(--muted);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .filter-btn.active {
    background: var(--accent);
    border-color: var(--accent);
    color: white;
  }

  /* TABS */
  .tabs {
    display: flex;
    padding: 0 20px;
    border-bottom: 1px solid var(--border);
    gap: 4px;
  }
  .tab {
    padding: 10px 16px;
    font-size: 14px;
    color: var(--muted);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: all 0.2s;
    font-family: 'DM Sans', sans-serif;
  }
  .tab.active {
    color: var(--accent);
    border-bottom-color: var(--accent);
  }

  /* STATS BAR */
  .stats-bar {
    padding: 10px 20px;
    font-size: 13px;
    color: var(--muted);
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .stats-bar strong { color: var(--accent2); }

  /* CARD LIST */
  #list-view { padding: 0 20px 100px; }

  .resto-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 18px;
    margin-bottom: 12px;
    cursor: pointer;
    transition: transform 0.2s, border-color 0.2s;
    position: relative;
    overflow: hidden;
    box-shadow: 0 2px 8px rgba(0,0,0,0.07);
  }
  .resto-card::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
    background: var(--accent);
    opacity: 0;
    transition: opacity 0.2s;
  }
  .resto-card:hover { transform: translateX(3px); border-color: rgba(232,83,58,0.3); }
  .resto-card:hover::before { opacity: 1; }

  .card-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 10px;
    margin-bottom: 8px;
  }

  .card-name {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 17px;
    color: var(--text);
    line-height: 1.2;
  }

  .price-badge {
    flex-shrink: 0;
    padding: 3px 10px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 500;
  }
  .price-pas-cher { background: rgba(78,203,113,0.15); color: var(--success); border: 1px solid rgba(78,203,113,0.2); }
  .price-correct { background: rgba(242,166,90,0.15); color: var(--accent2); border: 1px solid rgba(242,166,90,0.2); }
  .price-cher { background: rgba(232,83,58,0.15); color: var(--accent); border: 1px solid rgba(232,83,58,0.2); }
  .price-default { background: var(--dark3); color: var(--muted); border: 1px solid var(--border); }

  .card-cuisine {
    font-size: 13px;
    color: var(--muted);
    margin-bottom: 6px;
  }

  .card-address {
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 4px;
  }

  .card-comment {
    font-size: 13px;
    color: rgba(240,237,232,0.75);
    line-height: 1.5;
    font-style: italic;
    border-left: 2px solid var(--dark3);
    padding-left: 10px;
    margin-bottom: 8px;
  }

  .card-ambiance {
    font-size: 12px;
    color: var(--muted);
    display: flex;
    align-items: center;
    gap: 4px;
  }

  /* MAP VIEW */
  #map-view { display: none; height: calc(100vh - 180px); }
  #map { height: 100%; width: 100%; }

  /* FAB */
  .fab {
    position: fixed;
    bottom: 24px; right: 20px;
    width: 56px; height: 56px;
    border-radius: 50%;
    background: var(--accent);
    border: none;
    color: white;
    font-size: 26px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 4px 20px rgba(232,83,58,0.5);
    z-index: 200;
    transition: transform 0.2s, box-shadow 0.2s;
  }
  .fab:hover { transform: scale(1.08); box-shadow: 0 6px 28px rgba(232,83,58,0.6); }

  /* MODAL */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 300;
    align-items: flex-end;
    justify-content: center;
  }
  .modal-overlay.open { display: flex; }

  .modal {
    background: var(--dark2);
    border-radius: 24px 24px 0 0;
    border: 1px solid var(--border);
    width: 100%;
    max-width: 600px;
    max-height: 90vh;
    overflow-y: auto;
    padding: 24px 24px 40px;
    animation: slideUp 0.3s ease;
  }
  @keyframes slideUp {
    from { transform: translateY(100%); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
  }

  .modal-handle {
    width: 40px; height: 4px;
    background: var(--border);
    border-radius: 2px;
    margin: 0 auto 20px;
  }

  .modal-title {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 20px;
    margin-bottom: 20px;
    color: var(--text);
  }

  .form-group { margin-bottom: 16px; }
  .form-label {
    display: block;
    font-size: 12px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.8px;
    margin-bottom: 6px;
    font-weight: 500;
  }
  .form-input {
    width: 100%;
    background: var(--dark3);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 11px 14px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    outline: none;
    transition: border 0.2s;
  }
  .form-input:focus { border-color: var(--accent); }
  .form-input::placeholder { color: var(--muted); }
  textarea.form-input { resize: vertical; min-height: 80px; }

  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

  .btn-submit {
    width: 100%;
    padding: 14px;
    background: var(--accent);
    border: none;
    border-radius: var(--radius-sm);
    color: white;
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 16px;
    cursor: pointer;
    margin-top: 8px;
    transition: opacity 0.2s;
  }
  .btn-submit:hover { opacity: 0.9; }
  .btn-submit:disabled { opacity: 0.5; cursor: not-allowed; }

  .btn-cancel {
    width: 100%;
    padding: 12px;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    color: var(--muted);
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    cursor: pointer;
    margin-top: 8px;
  }

  /* DETAIL MODAL */
  .detail-modal .card-name { font-size: 22px; margin-bottom: 6px; }
  .detail-section { margin-top: 20px; }
  .detail-label {
    font-size: 11px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.8px;
    margin-bottom: 4px;
  }
  .detail-value { font-size: 15px; color: var(--text); line-height: 1.5; }

  .detail-actions {
    display: flex;
    gap: 10px;
    margin-top: 24px;
  }
  .btn-edit {
    flex: 1;
    padding: 12px;
    background: var(--dark3);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    cursor: pointer;
    text-align: center;
  }
  .btn-call {
    flex: 1;
    padding: 12px;
    background: rgba(78,203,113,0.1);
    border: 1px solid rgba(78,203,113,0.2);
    border-radius: var(--radius-sm);
    color: var(--success);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    cursor: pointer;
    text-align: center;
    text-decoration: none;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
  }

  /* LOADING / EMPTY */
  .loading {
    text-align: center;
    padding: 60px 20px;
    color: var(--muted);
  }
  .loading-spinner {
    width: 36px; height: 36px;
    border: 3px solid var(--dark3);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 16px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--muted);
  }
  .empty-icon { font-size: 48px; margin-bottom: 12px; }

  /* TOAST */
  .toast {
    position: fixed;
    bottom: 90px; left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--dark3);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 10px 20px;
    font-size: 14px;
    color: var(--text);
    z-index: 400;
    opacity: 0;
    transition: all 0.3s;
    white-space: nowrap;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  .toast.success { border-color: rgba(78,203,113,0.4); color: var(--success); }
  .toast.error { border-color: rgba(232,83,58,0.4); color: var(--accent); }
</style>
</head>
<body>

<header>
  <div class="logo"><img src="icon-192.png" style="width:36px;height:36px;border-radius:4px;vertical-align:middle;margin-right:10px;">Restos <span>Marseille</span></div>
  <div class="header-actions">
    <button class="btn-icon" onclick="refreshData()" title="Actualiser">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M23 4v6h-6M1 20v-6h6"/><path d="M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/></svg>
    </button>
  </div>
</header>

<div class="search-wrap">
  <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
  <input type="text" id="search" placeholder="Rechercher un restaurant..." oninput="filterRestos()">
</div>

<div class="filters" id="filters">
  <button class="filter-btn active" onclick="setFilter('all', this)">Tous</button>
  <button class="filter-btn" onclick="setFilter('Pas Cher', this)">Pas cher</button>
  <button class="filter-btn" onclick="setFilter('Correct', this)">Correct</button>
  <button class="filter-btn" onclick="setFilter('Cher', this)">Cher</button>
</div>

<div class="tabs">
  <div class="tab active" onclick="switchTab('list', this)">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="vertical-align:middle;margin-right:5px"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
    Liste
  </div>
  <div class="tab" onclick="switchTab('map', this)">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="vertical-align:middle;margin-right:5px"><polygon points="1 6 1 22 8 18 16 22 23 18 23 2 16 6 8 2 1 6"/><line x1="8" y1="2" x2="8" y2="18"/><line x1="16" y1="6" x2="16" y2="22"/></svg>
    Carte
  </div>
</div>

<div class="stats-bar" id="stats-bar"></div>

<div id="list-view">
  <div class="loading">
    <div class="loading-spinner"></div>
    Chargement des restaurants...
  </div>
</div>

<div id="map-view">
  <div id="map"></div>
</div>

<button class="fab" onclick="openAddModal()" title="Ajouter un restaurant">
  <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
</button>

<!-- DETAIL MODAL -->
<div class="modal-overlay" id="detail-overlay" onclick="closeDetail(event)">
  <div class="modal detail-modal" id="detail-modal">
    <div class="modal-handle"></div>
    <div id="detail-content"></div>
  </div>
</div>

<!-- ADD/EDIT MODAL -->
<div class="modal-overlay" id="form-overlay" onclick="closeForm(event)">
  <div class="modal" id="form-modal">
    <div class="modal-handle"></div>
    <div class="modal-title" id="form-title">Ajouter un restaurant</div>
    <form id="resto-form" onsubmit="submitForm(event)">
      <div class="form-group">
        <label class="form-label">Nom du restaurant *</label>
        <input type="text" class="form-input" id="f-nom" placeholder="Ex: Chez Marcel" required>
      </div>
      <div class="form-group">
        <label class="form-label">Adresse</label>
        <input type="text" class="form-input" id="f-adresse" placeholder="Ex: 10 rue de la Paix, 13001 Marseille">
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Téléphone</label>
          <input type="tel" class="form-input" id="f-tel" placeholder="04 91 ...">
        </div>
        <div class="form-group">
          <label class="form-label">Type de cuisine</label>
          <input type="text" class="form-input" id="f-cuisine" placeholder="Ex: Provençal">
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Prix</label>
        <select class="form-input" id="f-prix">
          <option value="">-- Choisir --</option>
          <option value="Pas Cher">Pas Cher</option>
          <option value="Correct">Correct</option>
          <option value="Cher">Cher</option>
          <option value="Correct et très bon">Correct et très bon</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Avis / Commentaire</label>
        <textarea class="form-input" id="f-commentaire" placeholder="Votre avis sur ce restaurant..."></textarea>
      </div>
      <div class="form-group">
        <label class="form-label">Ambiance</label>
        <input type="text" class="form-input" id="f-ambiance" placeholder="Ex: Calme, cosy, bruyant...">
      </div>
      <input type="hidden" id="f-row">
      <button type="submit" class="btn-submit" id="submit-btn">Ajouter</button>
      <button type="button" class="btn-cancel" onclick="closeFormModal()">Annuler</button>
    </form>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTjk9f0yF52-EYm14I3pTQbsZo881GzMOGHswjKGhqhNo6dnkus2pxN0RkMyrslVwFFJ9r6ljYBSciC/pub?gid=75747372&single=true&output=csv';
const SHEET_ID = '1tgboSBfdyyHw8IbDhtwOzjZR8DBGIAYmTcQv8UIv5FM';
const SHEET_NAME = 'Sheet1';

let allRestos = [];
let filtered = [];
let currentFilter = 'all';
let editingRow = null;
let map = null;
let mapInitialized = false;
let currentTab = 'list';

function parseCSV(text) {
  const lines = [];
  let cur = '', inQuote = false;
  const cells = [], rows = [[]];
  for (let i = 0; i < text.length; i++) {
    const ch = text[i];
    if (ch === '"') { inQuote = !inQuote; }
    else if (ch === ',' && !inQuote) { rows[rows.length-1].push(cur); cur = ''; }
    else if ((ch === '\n' || ch === '\r') && !inQuote) {
      rows[rows.length-1].push(cur); cur = '';
      if (ch === '\r' && text[i+1] === '\n') i++;
      rows.push([]);
    } else { cur += ch; }
  }
  rows[rows.length-1].push(cur);
  return rows.filter(r => r.some(c => c.trim()));
}

async function loadData() {
  try {
    const res = await fetch(CSV_URL + '&t=' + Date.now());
    const text = await res.text();
    const rows = parseCSV(text);
    allRestos = rows.slice(1).map((row, i) => ({
      row: i + 2,
      nom: (row[0] || '').trim(),
      adresse: (row[1] || '').trim(),
      tel: (row[2] || '').trim(),
      cuisine: (row[3] || '').trim(),
      prix: (row[4] || '').trim(),
      commentaire: (row[5] || '').trim(),
      ambiance: (row[6] || '').trim(),
    })).filter(r => r.nom);
    filterRestos();
  } catch(e) {
    document.getElementById('list-view').innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">⚠️</div>
        <p>Impossible de charger les données.<br>Vérifie ta connexion.</p>
      </div>`;
  }
}

function filterRestos() {
  const search = document.getElementById('search').value.toLowerCase();
  filtered = allRestos.filter(r => {
    const matchFilter = currentFilter === 'all' || (r.prix && (
      currentFilter === 'Cher'
        ? r.prix.toLowerCase() === 'cher' || r.prix.toLowerCase().startsWith('cher ')
        : r.prix.toLowerCase().includes(currentFilter.toLowerCase())
    ));
    const matchSearch = !search ||
      r.nom.toLowerCase().includes(search) ||
      r.cuisine.toLowerCase().includes(search) ||
      r.adresse.toLowerCase().includes(search) ||
      r.commentaire.toLowerCase().includes(search);
    return matchFilter && matchSearch;
  }).sort((a, b) => a.nom.localeCompare(b.nom, 'fr', {sensitivity: 'base'}));
  renderList();
  updateStats();
  if (currentTab === 'map' && mapInitialized) renderMap();
}

function setFilter(filter, btn) {
  currentFilter = filter;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  filterRestos();
}

function updateStats() {
  const el = document.getElementById('stats-bar');
  el.innerHTML = `<strong>${filtered.length}</strong> restaurant${filtered.length > 1 ? 's' : ''} ${currentFilter !== 'all' ? '· ' + currentFilter : ''}`;
}

function getPriceBadgeClass(prix) {
  if (!prix) return 'price-default';
  const p = prix.toLowerCase();
  if (p.includes('pas cher')) return 'price-pas-cher';
  if (p.includes('correct')) return 'price-correct';
  if (p.includes('cher')) return 'price-cher';
  return 'price-default';
}

function renderList() {
  const el = document.getElementById('list-view');
  if (!filtered.length) {
    el.innerHTML = `<div class="empty-state"><div class="empty-icon">🍽️</div><p>Aucun restaurant trouvé</p></div>`;
    return;
  }
  el.innerHTML = filtered.map(r => `
    <div class="resto-card" onclick="openDetail(${r.row})">
      <div class="card-header">
        <div class="card-name">${escHtml(r.nom)}</div>
        ${r.prix ? `<span class="price-badge ${getPriceBadgeClass(r.prix)}">${escHtml(r.prix)}</span>` : ''}
      </div>
      ${r.cuisine ? `<div class="card-cuisine">🍴 ${escHtml(r.cuisine)}</div>` : ''}
      ${r.adresse ? `<div class="card-address">📍 ${escHtml(r.adresse)}</div>` : ''}
      ${r.commentaire ? `<div class="card-comment">${escHtml(r.commentaire.substring(0, 120))}${r.commentaire.length > 120 ? '…' : ''}</div>` : ''}
      ${r.ambiance ? `<div class="card-ambiance">✨ ${escHtml(r.ambiance)}</div>` : ''}
    </div>
  `).join('');
}

function openDetail(row) {
  const r = allRestos.find(x => x.row === row);
  if (!r) return;
  const content = document.getElementById('detail-content');
  content.innerHTML = `
    <div class="card-header">
      <div class="card-name">${escHtml(r.nom)}</div>
      ${r.prix ? `<span class="price-badge ${getPriceBadgeClass(r.prix)}">${escHtml(r.prix)}</span>` : ''}
    </div>
    ${r.cuisine ? `<div class="card-cuisine" style="margin-bottom:4px">🍴 ${escHtml(r.cuisine)}</div>` : ''}
    ${r.adresse ? `<div class="card-address">📍 ${escHtml(r.adresse)}</div>` : ''}
    ${r.commentaire ? `
      <div class="detail-section">
        <div class="detail-label">Avis</div>
        <div class="detail-value">${escHtml(r.commentaire)}</div>
      </div>` : ''}
    ${r.ambiance ? `
      <div class="detail-section">
        <div class="detail-label">Ambiance</div>
        <div class="detail-value">${escHtml(r.ambiance)}</div>
      </div>` : ''}
    <div class="detail-actions">
      <button class="btn-edit" onclick="openEditModal(${row})">✏️ Modifier</button>
      ${r.tel ? `<a href="tel:${r.tel}" class="btn-call">📞 ${escHtml(r.tel)}</a>` : ''}
    </div>
  `;
  document.getElementById('detail-overlay').classList.add('open');
}

function closeDetail(e) {
  if (e.target === document.getElementById('detail-overlay')) {
    document.getElementById('detail-overlay').classList.remove('open');
  }
}

function openAddModal() {
  editingRow = null;
  document.getElementById('form-title').textContent = 'Ajouter un restaurant';
  document.getElementById('submit-btn').textContent = 'Ajouter';
  document.getElementById('resto-form').reset();
  document.getElementById('form-overlay').classList.add('open');
}

function openEditModal(row) {
  const r = allRestos.find(x => x.row === row);
  if (!r) return;
  editingRow = row;
  document.getElementById('detail-overlay').classList.remove('open');
  document.getElementById('form-title').textContent = 'Modifier le restaurant';
  document.getElementById('submit-btn').textContent = 'Enregistrer';
  document.getElementById('f-nom').value = r.nom;
  document.getElementById('f-adresse').value = r.adresse;
  document.getElementById('f-tel').value = r.tel;
  document.getElementById('f-cuisine').value = r.cuisine;
  document.getElementById('f-prix').value = r.prix;
  document.getElementById('f-commentaire').value = r.commentaire;
  document.getElementById('f-ambiance').value = r.ambiance;
  document.getElementById('f-row').value = row;
  document.getElementById('form-overlay').classList.add('open');
}

function closeForm(e) {
  if (e.target === document.getElementById('form-overlay')) closeFormModal();
}

function closeFormModal() {
  document.getElementById('form-overlay').classList.remove('open');
}

async function submitForm(e) {
  e.preventDefault();
  const btn = document.getElementById('submit-btn');
  btn.disabled = true;
  btn.textContent = 'Enregistrement...';

  const values = [
    document.getElementById('f-nom').value,
    document.getElementById('f-adresse').value,
    document.getElementById('f-tel').value,
    document.getElementById('f-cuisine').value,
    document.getElementById('f-prix').value,
    document.getElementById('f-commentaire').value,
    document.getElementById('f-ambiance').value,
  ];

  try {
    if (editingRow) {
      await writeRow(editingRow, values);
      showToast('Restaurant modifié !', 'success');
    } else {
      await appendRow(values);
      showToast('Restaurant ajouté !', 'success');
    }
    closeFormModal();
    await loadData();
  } catch(err) {
    showToast('Erreur lors de la sauvegarde', 'error');
  }

  btn.disabled = false;
  btn.textContent = editingRow ? 'Enregistrer' : 'Ajouter';
}

async function appendRow(values) {
  if (!window.APPS_SCRIPT_URL) throw new Error('No script URL');
  const res = await fetch(window.APPS_SCRIPT_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'text/plain' },
    body: JSON.stringify({ action: 'append', values })
  });
  const data = await res.json();
  if (data.status !== 'ok') throw new Error('Write failed');
}

async function writeRow(row, values) {
  if (!window.APPS_SCRIPT_URL) throw new Error('No script URL');
  const res = await fetch(window.APPS_SCRIPT_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'text/plain' },
    body: JSON.stringify({ action: 'update', row, values })
  });
  const data = await res.json();
  if (data.status !== 'ok') throw new Error('Update failed');
}

function switchTab(tab, el) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  if (tab === 'list') {
    document.getElementById('list-view').style.display = 'block';
    document.getElementById('map-view').style.display = 'none';
  } else {
    document.getElementById('list-view').style.display = 'none';
    document.getElementById('map-view').style.display = 'block';
    initMap();
  }
}

function initMap() {
  if (!mapInitialized) {
    map = L.map('map').setView([43.2965, 5.3698], 13);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
      attribution: '© OpenStreetMap © CARTO',
      maxZoom: 19
    }).addTo(map);
    mapInitialized = true;
  }
  renderMap();
}

const geocodeCache = {};

async function geocodeAdresse(adresse) {
  if (geocodeCache[adresse]) return geocodeCache[adresse];
  try {
    const q = encodeURIComponent(adresse + ', Marseille');
    const res = await fetch(`https://api-adresse.data.gouv.fr/search/?q=${q}&limit=1`);
    const data = await res.json();
    if (data.features && data.features.length) {
      const [lng, lat] = data.features[0].geometry.coordinates;
      geocodeCache[adresse] = { lat, lng };
      return { lat, lng };
    }
  } catch(e) {}
  return null;
}

async function renderMap() {
  if (!map) return;
  map.eachLayer(l => { if (l instanceof L.Marker) map.removeLayer(l); });

  const restoAvecAdresse = filtered.filter(r => r.adresse);
  if (!restoAvecAdresse.length) return;

  const results = await Promise.all(restoAvecAdresse.map(async r => {
    const coords = await geocodeAdresse(r.adresse);
    return coords ? { r, ...coords } : null;
  }));

  results.filter(Boolean).forEach(({ r, lat, lng }) => {
    const couleur = r.prix && r.prix.toLowerCase().includes('pas') ? '#4ecb71'
      : r.prix && r.prix.toLowerCase().includes('cher') ? '#E8533A' : '#F2A65A';
    const icon = L.divIcon({
      html: `<div style="background:${couleur};width:14px;height:14px;border-radius:50%;border:2.5px solid white;box-shadow:0 2px 6px rgba(0,0,0,0.4);"></div>`,
      iconSize: [14, 14],
      iconAnchor: [7, 7],
      className: ''
    });
    L.marker([lat, lng], { icon })
      .bindPopup(`
        <div style="font-family:sans-serif;min-width:160px;">
          <strong style="font-size:14px;">${escHtml(r.nom)}</strong><br>
          ${r.cuisine ? `<span style="color:#888;font-size:12px;">${escHtml(r.cuisine)}</span><br>` : ''}
          ${r.prix ? `<span style="font-size:12px;">${escHtml(r.prix)}</span><br>` : ''}
          ${r.commentaire ? `<em style="font-size:12px;color:#555;">${escHtml(r.commentaire.substring(0,80))}...</em>` : ''}
        </div>
      `)
      .addTo(map);
  });
}

function refreshData() {
  document.getElementById('list-view').innerHTML = `<div class="loading"><div class="loading-spinner"></div>Actualisation...</div>`;
  loadData();
}

function showToast(msg, type = '') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show ' + type;
  setTimeout(() => t.className = 'toast', 3000);
}

function escHtml(str) {
  return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

loadData();
</script>
</body>
</html>
